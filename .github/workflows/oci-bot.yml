name: OCI ARM Host Capacity Bot

on:
  schedule:
    - cron: '*/1 * * * *' # Berjalan otomatis setiap 1 menit
  workflow_dispatch: # Memungkinkan Anda menjalankan bot secara manual lewat tombol

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: curl, json, openssl

    - name: Install Dependencies
      run: composer install

    - name: Create OCI Config and Private Key
      run: |
        mkdir -p ~/.oci
        echo "[DEFAULT]" > ~/.oci/config
        echo "user=${{ secrets.OCI_USER_ID }}" >> ~/.oci/config
        echo "fingerprint=${{ secrets.OCI_FINGERPRINT }}" >> ~/.oci/config
        echo "tenancy=${{ secrets.OCI_TENANCY_ID }}" >> ~/.oci/config
        echo "region=${{ secrets.OCI_REGION }}" >> ~/.oci/config
        echo "key_file=~/.oci/oci_api_key.pem" >> ~/.oci/config
        
        # Menggunakan format kustom agar teks teks privat terbaca utuh multi-baris
        cat << 'EOF' > ~/.oci/oci_api_key.pem
        ${{ secrets.OCI_PRIVATE_KEY }}
        EOF
        
        chmod 600 ~/.oci/oci_api_key.pem


    - name: Run Bot Script
      env:
        OCID_USER: ${{ secrets.OCI_USER_ID }}
        OCID_TENANCY: ${{ secrets.OCI_TENANCY_ID }}
        OCI_REGION: ${{ secrets.OCI_REGION }}
        OCID_SUBNET: ${{ secrets.OCI_SUBNET_ID }}
        OCID_IMAGE: ${{ secrets.OCI_IMAGE_ID }}
        SSH_PUBLIC_KEY: ${{ secrets.OCI_SSH_PUBLIC_KEY }}
        # Opsional: Jika ingin batasi OCPU dan RAM tertentu
        # OCPU: 4
        # MEMORY: 24
        OCPU: 2
        MEMORY_IN_GBS: 12
        BOOT_VOLUME_SIZE_IN_GBS: 150
      run: |
        php index.php
