name: OCI ARM Host Capacity Bot

on:
  schedule:
    - cron: '*/1 * * * *' # Berjalan otomatis setiap 1 menit
  workflow_dispatch: # Memungkinkan Anda menjalankan bot secara manual lewat tombol

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: curl, json, openssl

    - name: Install Dependencies
      run: composer install

    - name: Create OCI Config and Private Key
      run: |
        mkdir -p ~/.oci
        echo "[DEFAULT]" > ~/.oci/config
        echo "user=${{ secrets.OCI_USER_ID }}" >> ~/.oci/config
        echo "fingerprint=${{ secrets.OCI_FINGERPRINT }}" >> ~/.oci/config
        echo "tenancy=${{ secrets.OCI_TENANCY_ID }}" >> ~/.oci/config
        echo "region=${{ secrets.OCI_REGION }}" >> ~/.oci/config
        echo "key_file=~/.oci/oci_api_key.pem" >> ~/.oci/config
        
        # Menggunakan format kustom agar teks teks privat terbaca utuh multi-baris
        cat << 'EOF' > ~/.oci/oci_api_key.pem
        ${{ secrets.OCI_PRIVATE_KEY }}
        EOF
        
        chmod 600 ~/.oci/oci_api_key.pem

    - name: Run Bot Script
      env:
        OCI_USER_ID: ${{ secrets.OCI_USER_ID }}
        OCI_TENANCY_ID: ${{ secrets.OCI_TENANCY_ID }}
        OCI_REGION: ${{ secrets.OCI_REGION }}
        OCI_SUBNET_ID: ${{ secrets.OCI_SUBNET_ID }}
        OCI_IMAGE_ID: ${{ secrets.OCI_IMAGE_ID }}
        OCI_SSH_PUBLIC_KEY: ${{ secrets.OCI_SSH_PUBLIC_KEY }}
        OCI_KEY_FILE_PATH: /home/runner/.oci/oci_api_key.pem
        # Menambahkan variabel fingerprint yang kurang
        OCI_KEY_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
        # Pembatasan spesifikasi ARM kustom Anda
        OCI_OCPUS: 2
        OCI_MEMORY_IN_GBS: 12
        OCI_BOOT_VOLUME_SIZE_IN_GBS: 150
      run: |
        php index.php


