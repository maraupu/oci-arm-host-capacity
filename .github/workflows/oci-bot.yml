name: OCI ARM Host Capacity Bot

on:
  workflow_dispatch:
  schedule:
    - cron: '*/1 * * * *' # Minimal interval yang stabil di GitHub Actions

# Diperlukan agar runner bisa mematikan workflow ini sendiri saat sukses
permissions:
  actions: write
  contents: read

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: curl, json, openssl

    - name: Install Dependencies
      run: composer install

    - name: Create OCI Config and Private Key
      run: |
        mkdir -p ~/.oci
        echo "[DEFAULT]" > ~/.oci/config
        echo "user=${{ secrets.OCI_USER_ID }}" >> ~/.oci/config
        echo "fingerprint=${{ secrets.OCI_FINGERPRINT }}" >> ~/.oci/config
        echo "tenancy=${{ secrets.OCI_TENANCY_ID }}" >> ~/.oci/config
        echo "region=${{ secrets.OCI_REGION }}" >> ~/.oci/config
        echo "key_file=/home/runner/.oci/oci_api_key.pem" >> ~/.oci/config
        
        cat << 'EOF' > /home/runner/.oci/oci_api_key.pem
        ${{ secrets.OCI_PRIVATE_KEY }}
        EOF
        chmod 600 /home/runner/.oci/oci_api_key.pem

    - name: Run Bot Script
      env:
        OCI_USER_ID: ${{ secrets.OCI_USER_ID }}
        OCI_TENANCY_ID: ${{ secrets.OCI_TENANCY_ID }}
        OCI_REGION: ${{ secrets.OCI_REGION }}
        OCI_KEY_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
        OCI_PRIVATE_KEY_FILENAME: /home/runner/.oci/oci_api_key.pem
        
        OCI_SUBNET_ID: ${{ secrets.OCI_SUBNET_ID }}
        OCI_IMAGE_ID: ${{ secrets.OCI_IMAGE_ID }}
        OCI_SSH_PUBLIC_KEY: ${{ secrets.OCI_SSH_PUBLIC_KEY }}
        OCI_SHAPE: VM.Standard.A1.Flex
        OCI_OCPUS: 2
        OCI_MEMORY_IN_GBS: 12
        OCI_BOOT_VOLUME_SIZE_IN_GBS: 150
        
        OCI_AVAILABILITY_DOMAIN: ""
        OCI_MAX_INSTANCES: 1
      run: |
        php index.php

    # Step di bawah ini HANYA berjalan jika 'php index.php' mengembalikan status SUKSES (exit 0)
    - name: Send Telegram Notification on Success
      if: success()
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        MESSAGE="🎉 *OCI ARM Instance Berhasil Dibuat!*%0AServer Anda sudah aktif di Oracle Cloud."
        curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
          -d "chat_id=${TELEGRAM_CHAT_ID}" \
          -d "text=${MESSAGE}" \
          -d "parse_mode=Markdown"

    - name: Disable Workflow Automatically
      if: success()
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        echo "Mematikan bot otomatis karena server sudah berhasil dibuat..."
        gh workflow disable oci-bot.yml
